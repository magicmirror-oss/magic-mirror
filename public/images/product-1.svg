<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#080808"/>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="mir" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
    </linearGradient>
  </defs>
  <rect x="70" y="30" width="260" height="340" rx="4" fill="url(#mir)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="76" y="36" width="248" height="328" rx="4" fill="rgba(12,12,18,0.85)"/>
  <rect x="70" y="30" width="260" height="340" rx="4" fill="none" stroke="rgba(200,230,255,0.5)" stroke-width="12" opacity="0.3"/>
  <text x="200" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">Classic LED</text>
</svg>
