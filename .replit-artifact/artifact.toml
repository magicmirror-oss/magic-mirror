kind = "web"
previewPath = "/"
title = "Magic Mirror"
version = "1.0.0"
id = "artifacts/magic-mirror"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25803

[services.development]
run = "pnpm --filter @workspace/magic-mirror run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magic-mirror", "run", "build" ]
serve = "static"
publicDir = "artifacts/magic-mirror/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25803"
BASE_PATH = "/"
